<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Любими модели | DesignRealm</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9998;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.show {
      display: flex;
    }

    .confirm-box {
      background: rgba(82, 29, 68, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 2rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .confirm-box h3 {
      margin: 0 0 0.7rem;
      color: #fff;
    }

    .confirm-box p {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 1.5rem;
    }

    .confirm-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .btn-sm {
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
    }

    .btn-sm.danger {
      background: rgba(180, 40, 60, 0.3);
      color: #ffb3b3;
      border: 1px solid rgba(180, 40, 60, 0.4);
    }

    .btn-sm.primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <a href="index.html">
        <img src="images/logo_notext.png" alt="DesignRealm Logo">
        <span>DesignRealm</span>
      </a>
    </div>
    <nav id="nav">
      <a href="index.html">Начало</a>
      <a href="3dprint.html">3D принтирането</a>
      <a href="catalog.html">Каталог</a>
      <a href="blog.html">Блог</a>
      <a href="about.html">За нас</a>
      <a href="contact.html">Контакти</a>
      <a href="favorites.html" class="active">Любими</a>
      <a id="login-link" href="login.html">Вход</a>
      <a href="admin.html" id="admin-link" style="display:none;">Админ панел</a>
    </nav>

    <button id="menu-toggle">☰</button>

    <div id="dashboard" class="dashboard" style="display:none;">
      <button id="dashboard-btn">
        <span class="dash-avatar">👤</span>
      </button>
      <div id="dashboard-menu" class="dashboard-menu">
        <p id="user-greeting">Здравей!</p>
        <a href="favorites.html" class="active">❤️ Любими</a>
        <a href="profile.html">⚙️ Профил</a>
        <a href="upload.html">Качи модел</a>
        <button id="logout-btn" class="btn-logout">🚪 Изход</button>
      </div>
    </div>
  </header>

  <main class="favorites-page">
    <h1>❤️ Моите любими модели</h1>
    <p>Тук са запазените ти 3D модели. Можеш да ги разгледаш или премахнеш от списъка.</p>

    <div id="favorites-list" class="grid"></div>

    <button id="clearFavorites" class="btn"
      style="margin-top:1.5rem;background:linear-gradient(135deg,#dc3545,#c82333);">🗑️ Изчисти всички</button>
  </main>

  <footer>
    <p>© 2025 DesignRealm. Всички права запазени.</p>
  </footer>

  <script type="module" src="script.js"></script>
  <script type="module" src="dashboard.js"></script>
  <script type="module" src="check.js"></script>
  <script type="module" src="firebase-favorites.js"></script>
</body>

</html>
